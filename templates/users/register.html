{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6">
        <div class="card p-5 shadow-lg">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Utwórz konto</h3>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-2 py-2 fs-5">Kontynuuj</button>
            </form>
            
            <div class="mt-3 text-start">
                <small class="text-muted"><a href="{% url 'login' %}">Masz już konto? Zaloguj się.</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
